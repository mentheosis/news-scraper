<div class="view-layout graph-layout">
    <div id="graph-container" class="graph-view-full">
        <canvas id="graph-canvas"></canvas>
        <div class="graph-controls">
            <button id="graph-zoom-in" class="icon-btn-small">+</button>
            <button id="graph-zoom-out" class="icon-btn-small">-</button>
            <button id="graph-reset" class="icon-btn-small">⟲</button>
        </div>

        <!-- Node Creation FAB -->
        <button id="graph-add-node" class="fab-btn" title="Add Node">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        </button>

        <!-- Use ag-sidebar for node editing too! -->
        <ag-sidebar id="node-edit-sidebar" class="sidebar collapsed" width="300px" side="right">
            <div slot="header" class="panel-header">
                <h4 id="node-label">Node Title</h4>
                <button id="close-node-edit" class="icon-btn-small">✕</button>
            </div>
            <div slot="body" class="panel-body">
                <textarea id="node-summary" placeholder="Summary..."></textarea>
                <div class="panel-actions">
                    <button id="node-research-btn" class="node-btn research">Ask AI to Research</button>
                    <button id="node-save-btn" class="node-btn save">Save Changes</button>
                </div>
            </div>
        </ag-sidebar>
    </div>
</div>
